<body>

<h1>log search</h1>

<form id="ask-form">
    <input type="text" id="query" placeholder="ask the journal..." autofocus autocomplete="off" />
    <button type="submit" id="ask-btn">ask</button>
    <div class="opts">
        <label><input type="checkbox" id="retrieve-only" /> retrieve only (free)</label>
        &nbsp;&middot;&nbsp;
        <span class="k-presets">depth:
            <label class="k-btn"><input type="radio" name="k" value="8" checked />8</label>
            <label class="k-btn"><input type="radio" name="k" value="12" />12</label>
            <label class="k-btn"><input type="radio" name="k" value="20" />20</label>
        </span>
    </div>
</form>

<div id="result"></div>

<script>
const form = document.getElementById('ask-form');
const queryEl = document.getElementById('query');
const btnEl = document.getElementById('ask-btn');
const retrieveOnlyEl = document.getElementById('retrieve-only');
const resultEl = document.getElementById('result');

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const q = queryEl.value.trim();
    if (!q) return;

    btnEl.disabled = true;
    resultEl.innerHTML = '<div class="loading-spinner" aria-label="loading"></div>';

    try {
        const res = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: q, retrieve_only: retrieveOnlyEl.checked, k: parseInt(document.querySelector('input[name="k"]:checked').value, 10) || 5 })
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({ detail: `HTTP ${res.status}` }));
            throw new Error(err.detail || `HTTP ${res.status}`);
        }
        const data = await res.json();
        renderResult(data);
    } catch (err) {
        resultEl.innerHTML = '<div class="error">error: ' + esc(err.message) + '</div>';
    } finally {
        btnEl.disabled = false;
    }
});

function renderResult(data) {
    let html = '';
    if (data.answer) {
        html += '<div id="answer">' + esc(data.answer) + '</div>';
    }
    if (data.citations && data.citations.length) {
        html += '<div class="citations"><h2>citations</h2>';
        for (const c of data.citations) {
            const date = c.date_iso || '-';
            const summary = '[' + c.rank + '] ' + esc(c.file) + ' :: ' + esc(c.heading_path) + ' :: ' + date + ' (score ' + c.score.toFixed(3) + ')';
            html += '<details><summary>' + summary + '</summary><pre>' + esc(c.text) + '</pre></details>';
        }
        html += '</div>';
    }
    if (data.cost != null) {
        html += '<div class="meta">tokens in=' + data.tokens_in + ' out=' + data.tokens_out + ' &middot; cost ~$' + data.cost.toFixed(4) + '</div>';
    }
    if (data.date_filter) {
        html += '<div class="meta">date filter: ' + esc(data.date_filter) + '</div>';
    }
    if (data.session_queries > 0) {
        html += '<div class="meta">session: ' + data.session_queries + ' ' + (data.session_queries === 1 ? 'query' : 'queries') + ' &middot; total ~$' + data.session_cost.toFixed(4) + '</div>';
    }
    if (!html) {
        html = '<div class="meta" style="text-align:center;color:#999">no matches.</div>';
    }
    resultEl.innerHTML = html;
}

function esc(s) {
    return String(s).replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
}
</script>

</body>
</html>
