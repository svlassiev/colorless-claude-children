a { color: #0000CC; text-decoration: none; }

}

.tabs {
    border-bottom: 1px dashed #999;

    gap: 24px;
    font-family: 'SF Mono', Menlo, Monaco, monospace;
    font-size: 11px;

    padding: 6px 0;
    color: #666;
    cursor: pointer;

    margin-bottom: -1px;
}
.tab.active {
    color: #0000CC;
    border-bottom-color: #0000CC;
    font-weight: bold;
}
.tab.hidden { display: none; }

form {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 16px 0 24px;

.search-row {
    display: flex;
    width: 85%;

    font: 10pt verdana;

    border: 1px solid #999;
}
button {
    font: 10pt verdana;
    padding: 4px 14px;
    border: 1px solid #999;
    background: #f7f7f7;
    cursor: pointer;
}
button:hover { background: #ececec; }
button:disabled { color: #999; cursor: default; }

.opts {
    font-size: 9pt;
    color: #666;
    margin-top: 6px;
    width: 85%;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 6px;
    flex-wrap: wrap;
}
.opts > label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
}

.k-presets {
    display: inline-flex;
    align-items: center;
    gap: 8px;
}
.k-btn {
    font: inherit;
    color: #888;
    cursor: pointer;
    padding: 0;
    border: 0;
    background: none;
    user-select: none;
}
.k-btn input { display: none; }
.k-btn:hover { color: #333; }
.k-btn:has(input:checked) {
    color: #0000CC;
    text-decoration: underline;
    font-weight: bold;
}

#answer {
    margin: 16px 0 20px;
    padding: 12px 16px;
    background: #f7f7f7;
    border-left: 2px solid #0000CC;
    white-space: pre-wrap;
    font-size: 10pt;
    line-height: 1.55;
}

.photo-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-top: 16px;
}
@media (max-width: 700px) {
    .photo-grid { grid-template-columns: repeat(2, 1fr); }
}
.photo { background: white; text-align: center; }
.photo a { display: block; }
.photo img {
    max-width: 100%;
    height: auto;
    border: 5px inset #FFFFAA;
    background: #fff;
}
.photo .meta-line {
    font-family: 'SF Mono', Menlo, Monaco, monospace;
    font-size: 9px;
    color: #999;
    margin-top: 6px;
}
.photo .caption-line {
    font: 9pt/13pt verdana;
    color: #666;
    margin-top: 4px;
    text-align: left;
    padding: 0 2px;
}

/* Log-corpus citation list — collapsible details with the source excerpt. */
.citations { margin-top: 16px; }
.citations details {
    border-top: 1px dashed #ddd;
    padding: 8px 0;
}
.citations summary {
    font: 10px/1.4 'SF Mono', Menlo, Monaco, monospace;
    color: #666;
    cursor: pointer;
    list-style: none;
}
.citations summary:hover { text-decoration: underline; }
.citations pre {
    font: 10pt/15pt verdana;
    color: #333;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 8px 0 0;
    padding: 8px 12px;
    background: #fafafa;
    border-left: 2px solid #ccc;
}

/* Faded for citations the model didn't summarise (or that scored well
   below the top similarity match when no rerank ran). Hover restores
   full opacity so users can still inspect them. */
.photo.low-relevance,
.citations details.low-relevance { opacity: 0.4; transition: opacity 0.2s; }
.photo.low-relevance:hover,
.citations details.low-relevance:hover { opacity: 1; }

.meta {
    font-family: 'SF Mono', Menlo, Monaco, monospace;
    font-size: 9px;
    color: #999;
    text-align: right;
    margin-top: 12px;
}
.error { color: #cc0000; text-align: center; margin: 16px 0; }
.notice {
    margin: 16px 0 12px;
    padding: 8px 12px;
    background: #fff8e1;
    border-left: 2px solid #cc8800;
    color: #663300;
    font-size: 9pt;
    line-height: 1.45;
}

<div id="auth-bar">
    <span id="auth-label"></span>
    <button id="signin-btn" style="display: none;">sign in</button>
    <button id="signout-btn" style="display: none;">sign out</button>
</div>

<h1>explore</h1>

<div class="tabs" id="tabs">
    <div class="tab active" data-tab="photo">photos</div>
    <div class="tab hidden" data-tab="log" id="tab-log">log</div>
</div>

<form id="ask-form">

        <input type="text" id="query" placeholder="describe a photo..." autofocus autocomplete="off" />
        <button type="submit" id="ask-btn">explore</button>
    </div>
    <div class="opts">
        <label><input type="checkbox" id="retrieve-only" /> retrieve only (free)</label>
        &nbsp;&middot;&nbsp;

            <label class="k-btn"><input type="radio" name="k" value="12" />12</label>
            <label class="k-btn"><input type="radio" name="k" value="20" />20</label>
        </span>
    </div>
</form>

<div id="result"></div>

// hiking project's Firebase app — same project (thematic-acumen-225120).
//
// authDomain = default <project>.firebaseapp.com. signInWithPopup uses
// postMessage across origins to deliver the result, so the storage-
// partitioning problem that breaks signInWithRedirect on mobile doesn't

// Firebase support. Reverted to the simpler standard pattern.)

    apiKey: "AIzaSyCY-TsZmlriRqWMKI0pV2x4FKDtGY8ChHY",
    authDomain: "thematic-acumen-225120.firebaseapp.com",
    projectId: "thematic-acumen-225120",
    appId: "1:771353780452:web:f28f5686047cc327c50cf1",
};

const firebaseApp = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(firebaseApp);
const googleProvider = new GoogleAuthProvider();
// Always show the account chooser — don't auto-pick the only signed-in account.
googleProvider.setCustomParameters({ prompt: 'select_account' });

const GCS_BASE = 'https://storage.googleapis.com/colorless-days-children';
const form = document.getElementById('ask-form');
const queryEl = document.getElementById('query');
const btnEl = document.getElementById('ask-btn');

let activeTab = 'photo';
// Sticky notice prepended to the anon-state auth-bar after a non-allow-listed
// sign-in. Cleared the moment a successful authed status comes back.
let notAuthorizedMsg = '';

async function getIdToken() {
    if (!currentUser) return null;
    // SDK refreshes automatically if expired (default ~5min buffer before exp).
    return await currentUser.getIdToken();
}

// Tab clicking (only photo wired today)
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        if (tab.classList.contains('hidden')) return;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeTab = tab.dataset.tab;
        if (activeTab === 'photo') queryEl.placeholder = 'describe a photo...';
        else queryEl.placeholder = 'ask the journal...';
    });
});

async function fetchAuthStatus() {
    const token = await getIdToken();
    const headers = token ? { 'Authorization': 'Bearer ' + token } : {};
    try {
        const res = await fetch('/explore/api/auth/status', { headers });
        if (res.status === 401 && token) {
            // Signed-in but rejected by backend (most commonly: email not on
            // the allow-list). Drop to anon state with a sticky notice; the
            // signOut triggers onAuthStateChanged → re-runs this fn without
            // the Bearer token, which then renders the anon UI.
            notAuthorizedMsg = (currentUser?.email || 'this account') + ' not authorized · ';
            await signOut(auth);
            return;
        }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const d = await res.json();
        if (d.authed) {
            notAuthorizedMsg = '';
            authLabel.textContent = d.email + ' · ' + d.quota_remaining + '/' + d.quota_cap + ' left today · ';
            signinBtn.style.display = 'none';
            signoutBtn.style.display = 'inline';
            if (d.log_tab_enabled) tabLog.classList.remove('hidden');
            else tabLog.classList.add('hidden');
        } else {
            authLabel.textContent = notAuthorizedMsg + 'anonymous · ' + d.quota_remaining + '/' + d.quota_cap + ' left today · ';
            signinBtn.style.display = 'inline';
            signoutBtn.style.display = 'none';
            tabLog.classList.add('hidden');
        }
    } catch (err) {
        authLabel.textContent = 'auth status unavailable';
    }
}

onAuthStateChanged(auth, (user) => {
    currentUser = user || null;
    fetchAuthStatus();
});

// signInWithPopup must be called synchronously from the click handler so the
// browser treats the popup as user-initiated. No async work before the call.
signinBtn.addEventListener('click', () => {
    signInWithPopup(auth, googleProvider).catch((err) => {
        authLabel.textContent = 'sign-in failed: ' + (err.code || err.message);
    });
});

signoutBtn.addEventListener('click', async () => {
    try {
        await signOut(auth);
    } catch (err) {
        authLabel.textContent = 'sign-out failed: ' + (err.code || err.message);
    }
});

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const q = queryEl.value.trim();
    if (!q) return;

    btnEl.disabled = true;
    resultEl.innerHTML = '<div class="loading-spinner" aria-label="loading"></div>';

    const headers = { 'Content-Type': 'application/json' };
    const token = await getIdToken();
    if (token) headers['Authorization'] = 'Bearer ' + token;

    const k = parseInt(document.querySelector('input[name="k"]:checked').value, 10) || 8;

    try {
        const res = await fetch('/explore/api/ask', {
            method: 'POST',
            headers,
            body: JSON.stringify({
                query: q,
                corpus: activeTab,
                retrieve_only: retrieveOnlyEl.checked,
                k
            })
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({ detail: 'HTTP ' + res.status }));
            throw new Error(err.detail || ('HTTP ' + res.status));
        }
        const data = await res.json();
        renderResult(data);
        fetchAuthStatus();  // refresh quota line
    } catch (err) {
        resultEl.innerHTML = '<div class="error">error: ' + esc(err.message) + '</div>';
    } finally {
        btnEl.disabled = false;
    }
});

function renderResult(data) {
    let html = '';
    if (data.answer) {
        html += '<div id="answer">' + esc(data.answer) + '</div>';
    } else if (data.answer_error) {
        html += '<div class="notice">' + esc(data.answer_error) + '</div>';
    }

    if (data.citations && data.citations.length) {
        // Fade signal: when the reranker ran (photo corpus, depth ≥ threshold)
        // trust its in_generation flag — Pro only saw those. Otherwise fall
        // back to the score-fade baseline for both corpora: anything below
        // FADE_THRESHOLD * top_score gets faded out.
        const FADE_THRESHOLD = 0.5;
        const topScore = data.citations[0].score || 0;
        const isLowRelevance = (c) => {
            if (data.rerank_used) return c.in_generation === false;
            return topScore > 0 && c.score < FADE_THRESHOLD * topScore;
        };

        if (data.corpus === 'log') {
            html += '<div class="citations">';
            for (const c of data.citations) {
                const date = c.date_iso || '-';
                const summary = '[' + c.rank + '] ' + esc(c.file || '') + ' :: ' + esc(c.heading_path || '') + ' :: ' + esc(date) + ' (score ' + c.score.toFixed(3) + ')';
                const cls = isLowRelevance(c) ? ' class="low-relevance"' : '';
                html += '<details' + cls + '><summary>' + summary + '</summary><pre>' + esc(c.text || '') + '</pre></details>';
            }
            html += '</div>';
        } else {
            html += '<div class="photo-grid">';
            for (const c of data.citations) {
                const date = c.date_iso || '';
                const cap = c.caption ? c.caption.slice(0, 140) : '';
                const linkHref = c.site_url || (GCS_BASE + '/' + encodeURI(c.blob_path));
                const imgSrc = GCS_BASE + '/' + encodeURI(c.blob_path);
                const cls = isLowRelevance(c) ? 'photo low-relevance' : 'photo';
                html += '<div class="' + cls + '">';
                html += '<a href="' + esc(linkHref) + '" target="_blank" rel="noopener">';
                html += '<img loading="lazy" src="' + esc(imgSrc) + '" alt="' + esc(cap) + '">';
                html += '</a>';
                html += '<div class="meta-line">[' + c.rank + '] ' + c.score.toFixed(3) + ' · ' + esc(date) + '</div>';
                if (cap) html += '<div class="caption-line">' + esc(cap) + '</div>';
                html += '</div>';
            }
            html += '</div>';
        }
    }
    if (data.cost != null) {
        html += '<div class="meta">tokens in=' + data.tokens_in + ' out=' + data.tokens_out + ' · cost ~$' + data.cost.toFixed(4) + '</div>';
    }
    if (data.date_filter) html += '<div class="meta">date filter: ' + esc(data.date_filter) + '</div>';
    html += '<div class="meta">' + esc(data.auth_state) + ' · ' + data.quota_used + '/' + data.quota_cap + ' used today</div>';

    if (!html) html = '<div class="meta" style="text-align:center;color:#999">no matches.</div>';
    resultEl.innerHTML = html;
}

function esc(s) {
    return String(s).replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
}

// Initial fetchAuthStatus is triggered by the first onAuthStateChanged callback
// (Firebase fires it once on init, with null user if not signed in).
</script>

</body>
