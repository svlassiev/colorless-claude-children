# nginx-proxy pod that forwards serg.vlassiev.info/explore/* → Cloud Run service.
# Lives on the existing e2-small node — ~10MB memory footprint.
# Forwards path as-is (no rewrite); explore service expects /explore/* prefix.

apiVersion: v1
kind: ConfigMap
metadata:
  name: explore-proxy-conf
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 256; }
    http {
      log_format auth_diag '$remote_addr "$request" $status '
                           'ua="$http_user_agent" '
                           'ref="$http_referer" '
                           'ups=$upstream_response_time';
      access_log /dev/stdout auth_diag;
      server_tokens off;

      server {
        listen 80;

        # Liveness probe target — kubernetes hits this directly on the pod IP.
        location = /healthz {
          return 200 "ok";
          add_header Content-Type text/plain;
        }

        # Forward /explore/* to Cloud Run with no path rewrite.
        # Cloud Run cert is for *.run.app — must set Host + SNI accordingly.
        # proxy_read_timeout slightly exceeds Cloud Run's own timeout so we
        # surface the upstream's 504 instead of nginx pre-empting at 90s.
        location /explore/ {
          proxy_pass https://explore-y4tpnsrvaa-ez.a.run.app;
          proxy_set_header Host explore-y4tpnsrvaa-ez.a.run.app;
          proxy_set_header X-Forwarded-For $remote_addr;
          proxy_set_header X-Forwarded-Proto https;
          proxy_pass_request_headers on;
          proxy_ssl_server_name on;
          proxy_http_version 1.1;
          proxy_read_timeout 130s;
          proxy_connect_timeout 10s;
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: explore-proxy
  labels:
    app: explore-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: explore-proxy
  template:
    metadata:
      labels:
        app: explore-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: conf
          configMap:
            name: explore-proxy-conf

---
apiVersion: v1
kind: Service
metadata:
  name: explore-proxy
  labels:
    app: explore-proxy
spec:
  type: NodePort
  selector:
    app: explore-proxy
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
